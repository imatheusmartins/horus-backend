spring:
  servlet:
    multipart:
      max-file-size: ${SPRING_SERVLET_MULTIPART_MAX_FILE_SIZE:20MB}
      max-request-size: ${SPRING_SERVLET_MULTIPART_MAX_REQUEST_SIZE:25MB}

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/horus}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    hikari:
      maximum-pool-size: ${DB_MAX_POOL_SIZE:5}
      minimum-idle: ${DB_MIN_IDLE:1}

  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update}
    show-sql: ${JPA_SHOW_SQL:true}
    open-in-view: ${JPA_OPEN_IN_VIEW:false}

ai:
  api:
    base-url: ${AI_API_BASE_URL:https://imatheusmartins-horusai-model-api.hf.space}
    predict-path: ${AI_API_PREDICT_PATH:/predict}
    timeout-seconds: ${AI_API_TIMEOUT_SECONDS:120}

app:
  storage:
    provider: ${APP_STORAGE_PROVIDER:local}
  upload:
    exames-dir: ${APP_UPLOAD_EXAMES_DIR:uploads/exames}
    public-path: ${APP_UPLOAD_PUBLIC_PATH:/uploads/exames}
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173,http://localhost:3000,http://127.0.0.1:3000}

supabase:
  url: ${SUPABASE_URL:https://usunscyrokvzdkrnvkqu.supabase.co}
  service-role-key: ${SUPABASE_SERVICE_ROLE_KEY:}
  storage:
    bucket: ${SUPABASE_STORAGE_BUCKET:exames}
    public: ${SUPABASE_STORAGE_PUBLIC:true}

server:
  port: ${PORT:${SERVER_PORT:8080}}
