spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/horus}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    hikari:
      maximum-pool-size: ${DB_MAX_POOL_SIZE:5}
      minimum-idle: ${DB_MIN_IDLE:1}

  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update}
    show-sql: ${JPA_SHOW_SQL:true}
    open-in-view: ${JPA_OPEN_IN_VIEW:false}

minio:
  endpoint: ${STORAGE_ENDPOINT:${MINIO_ENDPOINT:http://localhost:9000}}
  access-key: ${STORAGE_ACCESS_KEY:${MINIO_ACCESS_KEY:minioadmin}}
  secret-key: ${STORAGE_SECRET_KEY:${MINIO_SECRET_KEY:minioadmin}}
  bucket: ${STORAGE_BUCKET:${MINIO_BUCKET:horus}}
  public-base-url: ${STORAGE_PUBLIC_BASE_URL:${MINIO_PUBLIC_BASE_URL:}}

ai:
  api:
    base-url: ${AI_API_BASE_URL:http://localhost:8000}
    predict-path: ${AI_API_PREDICT_PATH:/predict}

server:
  port: ${PORT:${SERVER_PORT:8080}}

app:
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173,http://localhost:3000,http://127.0.0.1:3000}
